version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: resume_postgres
    restart: always
    environment:
      POSTGRES_DB:       resume_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: resume_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:    development
      PORT:        3000
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     resume_db
      DB_USER:     postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm run migrate && npm run seed && npm start"

volumes:
  pgdata:
